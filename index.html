<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Shooter</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  #overlay {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    background: rgba(0, 0, 0, 0.5);
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: sans-serif;
    z-index: 10;
    user-select: none;
  }
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }
  #crosshair:before, #crosshair:after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    background: white;
    transform: translate(-50%, -50%);
  }
  #crosshair:before { width: 2px; height: 14px; }
  #crosshair:after { width: 14px; height: 2px; }
  #scoreUI {
    position: absolute;
    top: 10px;
    right: 10px;
    color: white;
    font-size: 20px;
    font-family: sans-serif;
    z-index: 5;
    user-select: none;
  }
</style>
</head>
<body>
<div id="overlay">Click to play<br>WASD/Arrow to move, Space to jump, mouse to look</div>
<div id="crosshair" style="display:none"></div>
<div id="scoreUI">Score: 0 | Wave: 1</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script>
/* ---------- SOUNDS ---------- */
const deathSoundSrc = "death.mp3";
const playerDeathSoundSrc = "player_death.mp3";
const gunShotSoundSrc = "gun_shot.mp3";

function playEnemyDeath() {
  const sound = new Audio(deathSoundSrc);
  sound.volume = 0.5;
  sound.playbackRate = 0.9 + Math.random() * 0.2;
  sound.play();
}

function playPlayerDeath() {
  const sound = new Audio(playerDeathSoundSrc);
  sound.volume = 0.5;
  sound.play();
}

function playGunShot() {
  const sound = new Audio(gunShotSoundSrc);
  sound.volume = 0.5;
  sound.playbackRate = 0.95 + Math.random() * 0.1;
  sound.play();
}

/* ---------- SCENE ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 180);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

/* ---------- PLAYER ---------- */
const player = new THREE.Object3D();
player.position.set(0, 1.7, 0);
scene.add(player);
player.add(camera);

let pitch = 0;
let yaw = 0;
let canMove = false;
let keys = {};
let speed = 20;

/* Jump */
let velocityY = 0;
const GRAVITY = -40;
const JUMP_FORCE = 15;
let isOnGround = true;
const PLAYER_HEIGHT = 1.7;
const PLAYER_SIZE = 0.8;
const playerBox = new THREE.Box3();

/* Input */
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

/* Pointer lock */
const overlay = document.getElementById("overlay");
const crosshair = document.getElementById("crosshair");

let pendingRestart = false;
let spawningWave = false;
let gameStarted = false;

function showInstructions() {
  overlay.style.display = "block";
  overlay.innerHTML = "Click to play<br>WASD/Arrow to move, Space to jump, mouse to look";
}

overlay.addEventListener("click", () => {
  gameStarted = true;
  if (pendingRestart) {
    restartGame();
    pendingRestart = false;
  }
  document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
  const locked = document.pointerLockElement === document.body;
  canMove = locked;
  crosshair.style.display = locked ? "block" : "none";

  if (locked) {
    overlay.style.display = "none";
  } else if (pendingRestart) {
    overlay.style.display = "block";
  } else {
    showInstructions();
  }
});

/* Mouse look */
document.addEventListener("mousemove", e => {
  if (!canMove) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  const limit = Math.PI / 2 - 0.02;
  pitch = Math.max(-limit, Math.min(limit, pitch));
  player.rotation.y = yaw;
  camera.rotation.x = pitch;
});

/* ---------- GROUND ---------- */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshStandardMaterial({ color: 0x006622 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(50, 100, 50);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

/* ---------- GUN ---------- */
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 0.1, 0.6),
  new THREE.MeshStandardMaterial({ color: 0x404040 })
);
gun.position.set(0.3, -0.25, -0.6);
camera.add(gun);

/* ---------- ENEMIES ---------- */
const enemies = [];
let score = 0;
let wave = 1;

function spawnEnemy() {
  const size = 3;
  const height = 5;
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, height, size),
    new THREE.MeshStandardMaterial({ color: 0x884422 })
  );

  const angle = Math.random() * Math.PI * 2;
  const distance = 80 + Math.random() * 80;
  mesh.position.set(
    player.position.x + Math.cos(angle) * distance,
    height / 2,
    player.position.z + Math.sin(angle) * distance
  );

  scene.add(mesh);
  enemies.push({
    mesh,
    box: new THREE.Box3().setFromObject(mesh),
    health: 3,
    speed: 15 + wave * 0.5
  });
}

function spawnWave() {
  const count = 5 + wave * 2;
  spawningWave = true;

  if (gameStarted && document.pointerLockElement === document.body) {
    overlay.style.display = "block";
    overlay.innerHTML = "Wave " + wave;
  }

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      spawnEnemy();
      if (i === 0) {
        spawningWave = false;
      }
    }, i * 300);
  }

  setTimeout(() => {
    if (document.pointerLockElement === document.body) {
      overlay.style.display = "none";
    } else if (!pendingRestart) {
      showInstructions();
    }
  }, 1000);
}

/* ---------- BULLETS ---------- */
const bullets = [];

class Bullet {
  constructor(pos, dir) {
    this.mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xD4B628 })
    );
    this.mesh.position.copy(pos);
    scene.add(this.mesh);
    this.dir = dir.clone().normalize();
    this.speed = 70;
    this.alive = true;
  }

  update(delta) {
    if (!this.alive) return;

    this.mesh.position.addScaledVector(this.dir, this.speed * delta);

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.box.setFromObject(e.mesh);

      if (e.box.containsPoint(this.mesh.position)) {
        e.health--;
        e.mesh.material.color.set(0xff0000);
        e.mesh.scale.set(1.2, 1.2, 1.2);

        setTimeout(() => {
          if (e.mesh) {
            e.mesh.material.color.set(0x884422);
            e.mesh.scale.set(1, 1, 1);
          }
        }, 80);

        if (e.health <= 0) {
          playEnemyDeath();
          scene.remove(e.mesh);
          enemies.splice(i, 1);
          score += 1;
        }

        scene.remove(this.mesh);
        this.alive = false;
        return;
      }
    }

    if (this.mesh.position.distanceTo(player.position) > 150) {
      scene.remove(this.mesh);
      this.alive = false;
    }
  }
}

/* Shooting */
window.addEventListener("mousedown", () => {
  if (!canMove) return;

  const pos = new THREE.Vector3();
  gun.getWorldPosition(pos);

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  bullets.push(new Bullet(pos, dir));
  playGunShot();
});

/* ---------- PLAYER RESET ---------- */
function resetPlayer() {
  player.position.set(0, PLAYER_HEIGHT, 0);
  velocityY = 0;
  isOnGround = true;
  yaw = 0;
  pitch = 0;
  player.rotation.set(0, 0, 0);
  camera.rotation.set(0, 0, 0);
}

function clearEnemies() {
  for (const e of enemies) {
    scene.remove(e.mesh);
  }
  enemies.length = 0;
}

function clearBullets() {
  for (const b of bullets) {
    scene.remove(b.mesh);
    b.alive = false;
  }
  bullets.length = 0;
}

function restartGame() {
  score = 0;
  wave = 1;
  spawningWave = false;
  pendingRestart = false;
  clearEnemies();
  clearBullets();
  resetPlayer();
  showInstructions();
  spawnWave();
}

/* ---------- DEATH / RESTART ---------- */
function triggerDeath() {
  if (!canMove) return;

  canMove = false;
  pendingRestart = true;
  playPlayerDeath();

  if (document.pointerLockElement === document.body) {
    document.exitPointerLock();
  }

  overlay.style.display = "block";
  overlay.innerHTML = "YOU DIED :(<br>Score: " + score + "<br>Click to restart";
}

/* ---------- UPDATE ---------- */
function update(delta) {
  if (!canMove) return;

  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion).normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();
  let move = new THREE.Vector3();

  if (keys["w"] || keys["ArrowUp"]) move.add(forward);
  if (keys["s"] || keys["ArrowDown"]) move.add(forward.clone().negate());
  if (keys["a"] || keys["ArrowLeft"]) move.add(right.clone().negate());
  if (keys["d"] || keys["ArrowRight"]) move.add(right);

  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(speed * delta);
    player.position.add(move);
  }

  if (isOnGround && keys[" "]) {
    velocityY = JUMP_FORCE;
    isOnGround = false;
  }

  velocityY += GRAVITY * delta;
  player.position.y += velocityY * delta;

  if (player.position.y <= PLAYER_HEIGHT) {
    player.position.y = PLAYER_HEIGHT;
    velocityY = 0;
    isOnGround = true;
  }

  playerBox.set(
    new THREE.Vector3(
      player.position.x - PLAYER_SIZE,
      player.position.y,
      player.position.z - PLAYER_SIZE
    ),
    new THREE.Vector3(
      player.position.x + PLAYER_SIZE,
      player.position.y + PLAYER_HEIGHT,
      player.position.z + PLAYER_SIZE
    )
  );

  for (const e of enemies) {
    const dir = player.position.clone().sub(e.mesh.position).normalize();
    e.mesh.position.addScaledVector(dir, e.speed * delta);

    for (const other of enemies) {
      if (other === e) continue;
      const dist = e.mesh.position.distanceTo(other.mesh.position);
      if (dist < 4) {
        const push = e.mesh.position.clone().sub(other.mesh.position).normalize();
        e.mesh.position.addScaledVector(push, 0.5);
      }
    }

    e.box.setFromObject(e.mesh);
    if (playerBox.intersectsBox(e.box)) {
      triggerDeath();
      return;
    }
  }

  if (enemies.length === 0 && !spawningWave) {
    wave++;
    spawnWave();
  }
}

/* ---------- ANIMATE ---------- */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].update(delta);
    if (!bullets[i].alive) bullets.splice(i, 1);
  }

  update(delta);
  document.getElementById("scoreUI").innerText = "Score: " + score + " | Wave: " + wave;
  renderer.render(scene, camera);
}

animate();
showInstructions();
spawnWave();

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
